<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>天气预报</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; overflow-x: hidden; -webkit-font-smoothing: antialiased;
    transition: background 1.2s ease;
  }

  /* ========== Background Carousel ========== */
  .bg-carousel { position: fixed; inset: 0; z-index: 0; }
  .bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0; transition: opacity 1.8s ease; }
  .bg-slide.active { opacity: 1; }
  .bg-slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,14,26,0.2) 0%, rgba(10,14,26,0.35) 40%, rgba(10,14,26,0.65) 100%); }
  /* Carousel dots */
  .bg-carousel-dots { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; gap: 10px; }
  .bg-carousel-dots .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s ease; border: none; outline: none; padding: 0; }
  .bg-carousel-dots .dot.active { background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); transform: scale(1.2); }
  /* Scenic label */
  .bg-scenic-label { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 3; color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 1px; transition: all 0.8s ease; text-align: center; max-width: 80vw; }

  .weather-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: all 1.2s ease; }
  .weather-overlay::before, .weather-overlay::after { content: ''; position: absolute; border-radius: 50%; filter: blur(120px); transition: all 1.2s ease; }
  .weather-overlay::before { width: 900px; height: 900px; top: -25%; left: -20%; background: var(--glow-a, rgba(99,119,255,0.25)); animation: drift1 20s ease-in-out infinite; }
  .weather-overlay::after { width: 700px; height: 700px; bottom: -20%; right: -15%; background: var(--glow-b, rgba(138,99,255,0.2)); animation: drift2 24s ease-in-out infinite; }
  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(100px,80px) scale(1.12)} 66%{transform:translate(-50px,-30px) scale(0.93)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-80px,-60px) scale(1.1)} 66%{transform:translate(60px,40px) scale(0.9)} }

  /* ========== Aurora Gradient Bands ========== */
  .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
  .aurora-band {
    position: absolute; height: 300px; width: 200%; left: -50%;
    filter: blur(100px); mix-blend-mode: screen;
    animation: auroraSweep var(--adur) ease-in-out infinite;
    animation-delay: var(--adelay);
  }
  .aurora-band:nth-child(1) { top: 10%; background: linear-gradient(90deg, transparent 0%, rgba(130,180,255,0.2) 30%, rgba(180,130,255,0.25) 50%, rgba(100,200,180,0.15) 70%, transparent 100%); --adur: 25s; --adelay: 0s; }
  .aurora-band:nth-child(2) { top: 35%; background: linear-gradient(90deg, transparent 0%, rgba(255,150,120,0.18) 25%, rgba(200,130,255,0.22) 50%, rgba(120,180,255,0.15) 75%, transparent 100%); --adur: 30s; --adelay: -8s; }
  .aurora-band:nth-child(3) { top: 55%; background: linear-gradient(90deg, transparent 0%, rgba(100,200,255,0.18) 30%, rgba(180,140,220,0.2) 55%, rgba(140,220,180,0.12) 80%, transparent 100%); --adur: 28s; --adelay: -16s; }
  @keyframes auroraSweep {
    0%,100% { transform: translateX(-15%) rotate(-2deg); }
    50% { transform: translateX(15%) rotate(2deg); }
  }

  /* ========== Floating Light Orbs ========== */
  .orb { position: fixed; z-index: 0; pointer-events: none; border-radius: 50%; filter: blur(60px); opacity: 0.35; mix-blend-mode: screen; animation: orbFloat var(--odur) ease-in-out infinite; animation-delay: var(--odelay); }
  .orb:nth-child(1) { width: 400px; height: 400px; top: 15%; left: -5%; background: radial-gradient(circle, rgba(180,200,255,0.4), transparent); --odur: 20s; --odelay: 0s; }
  .orb:nth-child(2) { width: 300px; height: 300px; top: 55%; right: -8%; background: radial-gradient(circle, rgba(255,180,150,0.35), transparent); --odur: 24s; --odelay: -6s; }
  .orb:nth-child(3) { width: 250px; height: 250px; bottom: 5%; left: 25%; background: radial-gradient(circle, rgba(150,220,200,0.3), transparent); --odur: 26s; --odelay: -12s; }
  .orb:nth-child(4) { width: 350px; height: 350px; top: 30%; left: 50%; background: radial-gradient(circle, rgba(200,160,220,0.25), transparent); --odur: 22s; --odelay: -18s; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(60px, -40px) scale(1.15); }
    50% { transform: translate(-30px, 30px) scale(0.9); }
    75% { transform: translate(-50px, -20px) scale(1.08); }
  }

  /* ========== Subtle Geometric Grid ========== */
  .geo-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04; }
  .geo-grid::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
    background-size: 100px 100px;
    mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
  }

  /* ========== Light Ray Streaks ========== */
  .light-rays { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.25; }
  .ray {
    position: absolute; top: -10%; width: 1px; height: 120%;
    background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 60%, transparent);
    transform-origin: top center;
    animation: rayShimmer var(--rdur) ease-in-out infinite;
    animation-delay: var(--rdelay);
  }
  .ray:nth-child(1) { left: 15%; --rdur: 12s; --rdelay: 0s; transform: rotate(15deg); }
  .ray:nth-child(2) { left: 30%; --rdur: 14s; --rdelay: -4s; transform: rotate(22deg); width: 2px; }
  .ray:nth-child(3) { left: 55%; --rdur: 11s; --rdelay: -7s; transform: rotate(18deg); }
  .ray:nth-child(4) { left: 70%; --rdur: 15s; --rdelay: -10s; transform: rotate(12deg); width: 2px; }
  .ray:nth-child(5) { left: 85%; --rdur: 13s; --rdelay: -3s; transform: rotate(25deg); }
  @keyframes rayShimmer {
    0%,100% { opacity: 0.1; transform: rotate(var(--r,18deg)) scaleY(0.6); }
    50% { opacity: 0.5; transform: rotate(var(--r,18deg)) scaleY(1); }
  }

  /* ========== Floating Sparkles ========== */
  .sparkle {
    position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%;
    pointer-events: none; z-index: 0;
    animation: sparkleFloat var(--sdur) ease-in-out infinite;
    animation-delay: var(--sdelay); opacity: 0;
  }
  @keyframes sparkleFloat {
    0%,100% { opacity: 0; transform: translate(0, 0) scale(0); }
    10% { opacity: 1; transform: translate(10px, -20px) scale(1); }
    30% { opacity: 0.8; transform: translate(-5px, -60px) scale(1.5); }
    60% { opacity: 0.3; transform: translate(15px, -120px) scale(0.5); }
    100% { opacity: 0; transform: translate(-10px, -180px) scale(0); }
  }

  #particleCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ========== Main Layout: 3-column ========== */
  .app {
    position: relative; z-index: 2;
    width: 100%; max-width: 1400px; padding: 24px;
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    gap: 24px;
    align-items: start;
  }

  .card {
    background: rgba(255,255,255,0.05); backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
    padding: 40px 44px; transition: all 0.5s ease;
  }

  .search-wrap { position: relative; margin-bottom: 32px; }
  .search-bar {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 14px 20px; transition: all 0.3s ease;
  }
  .search-bar:focus-within { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.12); box-shadow: 0 0 32px rgba(124,154,255,0.2); }
  .search-bar svg { flex-shrink: 0; opacity: 0.45; width: 18px; height: 18px; }
  .search-bar input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 16px; font-family: inherit; min-width: 0; }
  .search-bar input::placeholder { color: rgba(255,255,255,0.35); }

  .search-dropdown {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: rgba(18,20,36,0.96); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; z-index: 10; display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); max-height: 360px; overflow-y: auto;
  }
  .search-dropdown.active { display: block; animation: slideDown 0.18s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .search-dropdown .item {
    padding: 14px 20px; cursor: pointer; transition: all 0.12s ease;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; flex-direction: column; gap: 2px;
    -webkit-tap-highlight-color: rgba(255,255,255,0.1);
    touch-action: manipulation;
  }
  .search-dropdown .item:last-child { border-bottom: none; }
  .search-dropdown .item:hover, .search-dropdown .item:active { background: rgba(255,255,255,0.1); }
  .search-dropdown .item .loc-name { font-size: 15px; color: rgba(255,255,255,0.85); }
  .search-dropdown .item .loc-path { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 1px; }

  .city-hero { position: relative; width: 100%; height: 200px; border-radius: 20px; overflow: hidden; margin-bottom: 32px; background: linear-gradient(135deg, rgba(100,130,200,0.15) 0%, rgba(80,100,160,0.08) 50%, rgba(60,80,140,0.15) 100%); }
  .city-hero img { width: 100%; height: 100%; object-fit: cover; transition: opacity 1s ease; }
  .city-hero .hero-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 48px 24px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); color: #fff; font-size: 26px; font-weight: 600; letter-spacing: 1px; }
  .city-hero .hero-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; border-radius: 20px; }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .weather-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .weather-icon { font-size: 88px; line-height: 1; filter: drop-shadow(0 12px 32px rgba(255,200,100,0.35)); animation: float 5s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .temp-block { text-align: right; }
  .temp-current { font-size: 96px; font-weight: 200; line-height: 1; color: #fff; letter-spacing: -5px; }
  .temp-unit { font-size: 28px; font-weight: 300; opacity: 0.55; vertical-align: super; }
  .weather-desc { font-size: 18px; color: rgba(255,255,255,0.65); margin-top: 2px; }

  .city-row { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .city-name { font-size: 22px; font-weight: 500; color: #fff; }
  .city-sub { font-size: 13px; color: rgba(255,255,255,0.4); }
  .update-time { font-size: 13px; color: rgba(255,255,255,0.4); margin-left: auto; }
  .refresh-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 10px #4ade80; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .sun-row { display: flex; gap: 14px; margin-bottom: 32px; }
  .sun-card { flex: 1; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 14px 18px; }
  .sun-card .sun-icon { font-size: 28px; }
  .sun-card .sun-label { font-size: 11px; color: rgba(255,255,255,0.35); }
  .sun-card .sun-time { font-size: 16px; color: #fff; font-weight: 500; }

  .details-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 32px; }
  .detail-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 18px 14px; text-align: center; transition: all 0.3s ease; }
  .detail-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
  .detail-item .label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 0.5px; }
  .detail-item .value { font-size: 22px; font-weight: 500; color: #fff; }
  .detail-item .unit { font-size: 12px; color: rgba(255,255,255,0.35); margin-left: 2px; }

  .forecast-title { font-size: 13px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }
  .forecast-strip { display: flex; gap: 10px; }
  .forecast-day { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 18px 10px; text-align: center; transition: all 0.3s ease; }
  .forecast-day:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
  .forecast-day .dow { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 10px; font-weight: 500; }
  .forecast-day .d-icon { font-size: 32px; margin-bottom: 10px; }
  .forecast-day .d-temps { font-size: 14px; color: rgba(255,255,255,0.65); }
  .forecast-day .d-hi { color: #fff; font-weight: 600; }
  .forecast-day .d-lo { color: rgba(255,255,255,0.35); margin-left: 5px; }

  .loader { display: flex; flex-direction: column; align-items: center; padding: 80px 0; gap: 16px; }
  .spinner { width: 44px; height: 44px; border: 2px solid rgba(255,255,255,0.08); border-top-color: rgba(124,154,255,0.7); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loader-text { color: rgba(255,255,255,0.4); font-size: 15px; }
  .error-msg { text-align: center; padding: 32px; color: #f87171; font-size: 15px; }

  /* ========== Side Panels (Attractions / Food) ========== */
  .side-panel {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 22px;
    padding: 24px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
    transition: all 0.5s ease;
    animation: panelSlideL 0.6s ease;
  }
  .side-panel.right { animation: panelSlideR 0.6s ease; }
  @keyframes panelSlideL { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
  @keyframes panelSlideR { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
  .side-panel::-webkit-scrollbar { width: 3px; }
  .side-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

  .side-panel .panel-header {
    display: flex; align-items: center; gap: 10px;
    color: #fff; font-size: 16px; font-weight: 600;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky; top: 0; background: inherit;
  }
  .side-panel .panel-icon { font-size: 20px; }

  .panel-item {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 13px; padding: 13px 15px;
    transition: all 0.25s ease;
  }
  .panel-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
  .panel-item .item-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  .panel-item .item-desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.5; }
  .panel-item .item-rank { display: inline-block; font-size: 10px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); padding: 1px 7px; border-radius: 8px; margin-top: 4px; }

  .panel-skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%);
    background-size: 200% 100%; animation: shimmer 2s infinite;
    border-radius: 13px; height: 50px;
  }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .panel-loading {
    display: flex; flex-direction: column; gap: 8px;
  }

  /* Hide mobile buttons on wide screens */
  .mobile-fab { display: none; }
  .mobile-overlay-backdrop { display: none; }

  /* ========== Responsive: Mobile Overlay Panels ========== */
  @media (max-width: 1200px) {
    .app { grid-template-columns: 1fr; max-width: 720px; }
    .side-panel { display: none; }

    /* Floating buttons — direct body children, always on top */
    .mobile-fab {
      position: fixed; z-index: 99;
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      animation: fabBounce 0.6s ease;
      color: #fff; padding: 0;
    }
    .mobile-fab:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .mobile-fab.left { bottom: 120px; left: 20px; }
    .mobile-fab.right { bottom: 120px; right: 20px; }
    @keyframes fabBounce { 0%{transform:scale(0)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }

    .mobile-fab { display: flex; }
    .mobile-overlay-backdrop {
      display: block;
      position: fixed; inset: 0; z-index: 20;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
    }
    .mobile-overlay-backdrop.active { opacity: 1; pointer-events: auto; }

    /* Mobile side panel overlay */
    .side-panel.mobile-overlay {
      display: flex;
      position: fixed; z-index: 21;
      top: 0; bottom: 0; width: 88vw; max-width: 400px;
      border-radius: 0; max-height: none;
      transform: translateX(-110%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      background: rgba(15,17,30,0.97); border: none; border-right: 1px solid rgba(255,255,255,0.08);
    }
    .side-panel.mobile-overlay.right { right: 0; left: auto; transform: translateX(110%); border-right: none; border-left: 1px solid rgba(255,255,255,0.08); }
    .side-panel.mobile-overlay.active { transform: translateX(0); }

    /* Close button on overlay */
    .mobile-close {
      position: absolute; top: 16px; right: 16px; z-index: 22;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .mobile-overlay.right .mobile-close { right: auto; left: 16px; }
    .mobile-close:active { background: rgba(255,255,255,0.2); }
  }
  @media (max-width: 640px) {
    .app { padding: 16px; } .card { padding: 24px 18px; border-radius: 22px; }
    .city-hero { height: 140px; border-radius: 16px; margin-bottom: 20px; }
    .city-hero .hero-label { font-size: 20px; padding: 32px 16px 14px; }
    .temp-current { font-size: 64px; } .weather-icon { font-size: 56px; }
    .details-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .detail-item { padding: 12px 8px; border-radius: 14px; }
    .detail-item .value { font-size: 18px; }
    .forecast-strip { gap: 5px; } .forecast-day { padding: 12px 4px; border-radius: 14px; }
    .forecast-day .d-icon { font-size: 24px; }
    .sun-row { gap: 8px; } .sun-card { padding: 10px 14px; border-radius: 14px; }
  }
</style>
</head>
<body>

<div class="bg-carousel" id="bgCarousel"></div>
<div class="bg-carousel-dots" id="bgCarouselDots"></div>
<div class="bg-scenic-label" id="bgScenicLabel"></div>

<!-- Ambient background layers -->
<div class="aurora" id="aurora">
  <div class="aurora-band"></div>
  <div class="aurora-band"></div>
  <div class="aurora-band"></div>
</div>
<div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div>
<div class="geo-grid"></div>
<div class="light-rays" id="lightRays">

// ========== Weather Category ==========
const WCAT={SUNNY:0,PARTLY_CLOUDY:1,CLOUDY:2,OVERCAST:3,FOG:4,DRIZZLE:5,RAIN:6,SHOWER:7,SNOW:8,THUNDER:9,UNKNOWN:10};
function classifyWMO(c){if(c===0)return WCAT.SUNNY;if(c===1||c===2)return WCAT.PARTLY_CLOUDY;if(c===3)return WCAT.OVERCAST;if(c===45||c===48)return WCAT.FOG;if(c>=51&&c<=57)return WCAT.DRIZZLE;if(c>=61&&c<=67)return WCAT.RAIN;if(c>=80&&c<=82)return WCAT.SHOWER;if([71,73,75,77,85,86].includes(c))return WCAT.SNOW;if(c>=95)return WCAT.THUNDER;return WCAT.UNKNOWN;}

const themes={

function applyTheme(cat){
  const t=themes[cat]||themes[WCAT.UNKNOWN];
  document.getElementById('weatherOverlay').style.setProperty('--glow-a',t.glowA);
  document.getElementById('weatherOverlay').style.setProperty('--glow-b',t.glowB);
  // Aurora intensity
  document.getElementById('aurora').style.opacity = t.auroraOpacity;
  // Orb color tones
  const orbs = document.querySelectorAll('.orb');
  const orbColors = t.orbHue==='warm'
    ? ['rgba(255,200,150,0.4)','rgba(255,160,100,0.35)','rgba(255,220,180,0.3)','rgba(255,180,130,0.25)']
    : t.orbHue==='cool'
    ? ['rgba(180,200,240,0.35)','rgba(160,180,220,0.3)','rgba(200,210,230,0.25)','rgba(170,190,210,0.2)']
    : ['rgba(180,200,230,0.35)','rgba(220,180,200,0.3)','rgba(180,210,200,0.25)','rgba(200,190,210,0.2)'];
  orbs.forEach((orb,i)=>{orb.style.background=orbColors[i];});

  startParticles(t.pType,t.pColor,t.pCount);
}

// ========== Particles ==========
let particles=[],particleType=null,particleColor=null,animId=null;
const canvas=document.getElementById('particleCanvas'),ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();

function startParticles(type,color,count){
  particleType=type;particleColor=color;particles=[];
  if(!type||count===0){if(animId){cancelAnimationFrame(animId);animId=null;}ctx.clearRect(0,0,canvas.width,canvas.height);return;}
  for(let i=0;i<count;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:type==='snow'?Math.random()*3+1:(type==='fog'?Math.random()*80+40:Math.random()*1.5+0.5),speed:type==='snow'?Math.random()*1.5+0.3:(type==='fog'?Math.random()*0.3+0.05:Math.random()*6+4),wind:type==='snow'?Math.random()*0.8-0.4:(type==='fog'?Math.random()*0.2-0.1:Math.random()*0.6-0.3),opacity:type==='fog'?Math.random()*0.5+0.2:Math.random()*0.7+0.3});
  if(!animId)animate();
}
function animate(){
  animId=requestAnimationFrame(animate);ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=particleColor.replace(/[\d.]+\)$/,String(p.opacity)+')');ctx.fill();p.y+=p.speed;p.x+=p.wind;if(p.y>canvas.height+20){p.y=-20;p.x=Math.random()*canvas.width;}if(p.x>canvas.width+20)p.x=-20;if(p.x<-20)p.x=canvas.width+20;}
}

// ========== City Gradient Generator (replaces Wikipedia images — works offline/no network) ==========
// Each city gets a unique, beautiful gradient based on name hash
function hashCity(name){let h=0;for(let i=0;i<name.length;i++)h=((h<<5)-h)+name.charCodeAt(i);return Math.abs(h);}

function cityGradients(cityName){
  const h=hashCity(cityName);
  const gradients=[];
  const palettes=[
    {a:'#667eea',b:'#764ba2',c:'#f093fb'},  // 紫粉
    {a:'#4facfe',b:'#00f2fe',c:'#43e97b'},  // 青蓝绿
    {a:'#fa709a',b:'#fee140',c:'#f5576c'},  // 粉橙
    {a:'#a18cd1',b:'#fbc2eb',c:'#8fd3f4'},  // 紫粉蓝
    {a:'#fccb90',b:'#d57eeb',c:'#e0c3fc'},  // 暖橙紫
    {a:'#e0c3fc',b:'#8ec5fc',c:'#4facfe'},  // 紫蓝
    {a:'#f093fb',b:'#f5576c',c:'#fee140'},  // 紫红黄
    {a:'#43e97b',b:'#38f9d7',c:'#4facfe'},  // 绿青蓝
    {a:'#ff9a9e',b:'#fecfef',c:'#fdfcfb'},  // 粉白
    {a:'#ffecd2',b:'#fcb69f',c:'#ff9a9e'},  // 暖橙
  ];
  const p=palettes[h%palettes.length];

  for(let i=0;i<5;i++){
    const angle=((h+i*41)%360);
    // Rotate colors for variety
    const c=[p.a,p.b,p.c];
    const shift=i%3;
    gradients.push({
      url:'linear-gradient('+angle+'deg, '+c[(0+shift)%3]+' 0%, '+c[(1+shift)%3]+' 50%, '+c[(2+shift)%3]+' 100%)',
      title:cityName+(i===0?'':' 视角'+(i+1)),
      desc:cityName+' 城市风光',
      isGradient:true
    });
  }
  return gradients;
}

// ========== City Scenic Images (now pure CSS gradients, zero network) ==========
async function fetchScenicImages(cityName){
  const gradients=cityGradients(cityName);
  return gradients;
}

let carouselImages=[],carouselIndex=0,carouselTimer=null,carouselPaused=false;

function buildCarousel(images){
  const container=document.getElementById('bgCarousel');
  const dotsEl=document.getElementById('bgCarouselDots');
  const labelEl=document.getElementById('bgScenicLabel');
  carouselImages=images;
  carouselIndex=0;
  if(carouselTimer)clearInterval(carouselTimer);

  if(images.length===0){
    container.innerHTML='';dotsEl.innerHTML='';labelEl.textContent='';return;
  }

  // Build slide elements (support both image URLs and CSS gradients)
  container.innerHTML=images.map((img,i)=>{
    const bgStyle = img.isGradient ? ('background:'+img.url) : ('background-image:url('+img.url+')');
    return '<div class="bg-slide'+(i===0?' active':'')+'" style="'+bgStyle+';background-size:cover;background-position:center" data-index="'+i+'"></div>';
  }).join('');

  // Build dots
  dotsEl.innerHTML=images.length>1?images.map((img,i)=>{
    return '<button class="dot'+(i===0?' active':'')+'" data-index="'+i+'" aria-label="'+(img.desc||img.title)+'"></button>';
  }).join(''):'';

  // Show scenic name
  labelEl.textContent=images[0]?.desc||images[0]?.title||'';
  labelEl.style.opacity='1';

  // Bind dot clicks
  dotsEl.querySelectorAll('.dot').forEach(d=>{
    d.addEventListener('click',()=>{const idx=parseInt(d.dataset.index);goToSlide(idx);resetCarouselTimer();});
  });

  // Keyboard nav
  if(images.length>1)resetCarouselTimer();
}

function goToSlide(idx){
  if(idx===carouselIndex||idx<0||idx>=carouselImages.length)return;
  const slides=document.querySelectorAll('.bg-slide');
  const dots=document.querySelectorAll('.bg-carousel-dots .dot');
  const labelEl=document.getElementById('bgScenicLabel');
  slides[carouselIndex]?.classList.remove('active');
  dots[carouselIndex]?.classList.remove('active');
  carouselIndex=idx;
  slides[carouselIndex]?.classList.add('active');
  dots[carouselIndex]?.classList.add('active');
  labelEl.style.opacity='0';
  setTimeout(()=>{
    labelEl.textContent=carouselImages[carouselIndex]?.desc||carouselImages[carouselIndex]?.title||'';
    labelEl.style.opacity='1';
  },400);
}

function resetCarouselTimer(){
  if(carouselTimer)clearInterval(carouselTimer);
  if(carouselImages.length<=1)return;
  carouselTimer=setInterval(()=>{const next=(carouselIndex+1)%carouselImages.length;goToSlide(next);},8000);
}

function stopCarousel(){
  if(carouselTimer){clearInterval(carouselTimer);carouselTimer=null;}
  document.getElementById('bgCarousel').innerHTML='';
  document.getElementById('bgCarouselDots').innerHTML='';
  document.getElementById('bgScenicLabel').textContent='';
  carouselImages=[];
}

function setCityBg(url){
  // Minimal fallback — just create a single slide
  const container=document.getElementById('bgCarousel');
  const dotsEl=document.getElementById('bgCarouselDots');
  stopCarousel();
  if(url){container.innerHTML='<div class="bg-slide active" style="background-image:url('+url+')"></div>';dotsEl.innerHTML='';}else{container.innerHTML='';}
}

// Build index for fast search
const searchIndex = [];
for (const c of chinaAll) {
  const isMunicipality = ['北京','上海','天津','重庆'].includes(c.p);
  // Display text for dropdown
  let displayPath;
  if (isMunicipality) {
    // 直辖市: show as "区名 · 市名"
    displayPath = c.n + (c.n === c.p ? '' : ' · ' + c.p);
  } else if (c.p === c.c || c.c === '') {
    // Province-level or prefecture-level city
    displayPath = c.n + ' · ' + c.p;
  } else {
    // District/county under prefecture city
    displayPath = c.n + ' · ' + c.c + ' · ' + c.p;
  }
  // Search tokens: all parts of the name + province + city
  const tokens = [c.n, c.p, c.c].filter(Boolean).join(' ').toLowerCase();
  searchIndex.push({...c, displayPath, tokens});
}

function geocodeLocal(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const results = [];
  for (const item of searchIndex) {
    if (item.tokens.includes(q) || item.n.toLowerCase().startsWith(q) || item.p.toLowerCase().includes(q)) {
      results.push(item);
    }
  }
  // Sort: exact name match first, then by name length (shorter=more likely)
  results.sort((a, b) => {
    const aEx = a.n.toLowerCase() === q ? 0 : 1;
    const bEx = b.n.toLowerCase() === q ? 0 : 1;
    if (aEx !== bEx) return aEx - bEx;
    return a.n.length - b.n.length;
  });
  return results.slice(0, 8);
}

async function geocode(query) {
  const local = geocodeLocal(query);
  if (local.length > 0) return local;
  try {
    const res = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=5&language=zh');
    if (!res.ok) return [];
    const data = await res.json();
    if (!data.results) return [];
    return data.results.map(r => ({
      n: r.name, p: r.admin1 || r.country || '', c: r.admin1 || '',
      lat: r.latitude, lon: r.longitude,
      displayPath: r.name + ' · ' + (r.admin1 || r.country || ''),
      tokens: (r.name + ' ' + (r.admin1 || '') + ' ' + (r.country || '')).toLowerCase()
    }));
  } catch (e) { return []; }
}

async function fetchWeather(lat, lon) {
  const params = 'latitude=' + lat + '&longitude=' + lon +
    '&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,sunrise,sunset,uv_index_max,wind_speed_10m_max,wind_gusts_10m_max' +
    '&hourly=apparent_temperature,relative_humidity_2m,visibility,pressure_msl&timezone=auto&forecast_days=5';
  const res = await fetch('https://api.open-meteo.com/v1/forecast?' + params);
  if (!res.ok) throw new Error('天气数据请求失败');
  return res.json();
}

  '🌦️ 毛毛雨': [[51,53,55,56,57]], '🌧️ 雨': [[61,63,65,66,67]], '🌨️ 雪': [[71,73,75,77,85,86]],
  '🌧️ 阵雨': [[80,81,82]], '⛈️ 雷暴': [[95,96,99]],
};
function getWeather(wmo) {
  for (const [l, gs] of Object.entries(weatherMap)) for (const g of gs) if (g.includes(wmo)) return l.split(' ');
  return ['🌈', '未知天气'];
}
function windDirection(deg) { return ['北', '东北', '东', '东南', '南', '西南', '西', '西北'][Math.round(deg / 45) % 8]; }
function formatTime(iso) { if (!iso) return '--:--'; return new Date(iso).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }

const cityAlias = {'南宁市':'南宁','贵阳市':'贵阳','昆明市':'昆明','拉萨市':'拉萨','兰州市':'兰州','西宁市':'西宁','银川市':'银川','呼和浩特市':'呼和浩特','海口市':'海口','哈尔滨市':'哈尔滨','广州市':'广州','杭州市':'杭州','南京市':'南京','武汉市':'武汉','成都市':'成都','西安市':'西安','长沙市':'长沙','合肥市':'合肥','石家庄市':'石家庄','太原市':'太原','沈阳市':'沈阳','长春市':'长春','郑州市':'郑州','南昌市':'南昌','济南市':'济南','贵阳市':'贵阳','福州市':'福州','呼伦贝尔':'呼伦贝尔','延吉':'延边','伊宁':'伊犁','西昌':'凉山','凯里':'黔东南','都匀':'黔南','景洪':'西双版纳','大理市':'大理','香格里拉':'迪庆','蒙自':'红河','芒市':'德宏','库尔勒':'巴音郭楞','锡林浩特':'锡林郭勒','喀什市':'喀什地区','和田市':'和田地区','阿克苏市':'阿克苏地区','阿勒泰市':'阿勒泰地区','塔城市':'塔城地区','伊宁市':'伊犁'};

function getCityGuide(cityName, provName) {
  // 1. 精确匹配
  if (cityGuide[cityName]) return cityGuide[cityName];
  // 1b. 别名
  const alias = cityAlias[cityName];
  if (alias && cityGuide[alias]) return cityGuide[alias];
  // 2. 去"市/省/州/区/县"后缀再精确
  const clean = cityName.replace(/[市区县州]$/,'');
  if (cityGuide[clean]) return cityGuide[clean];
  if (cityAlias[clean] && cityGuide[cityAlias[clean]]) return cityGuide[cityAlias[clean]];
  // 3. 省名 → 省会
  const capital = provinceCapital[cityName] || provinceCapital[clean] || (provName ? provinceCapital[provName] : null);
  if (capital && cityGuide[capital]) return cityGuide[capital];
  // 4. 区/县 → 找到所在城市（provName 中匹配）
  if (provName) {
    if (cityGuide[provName]) return cityGuide[provName];
    const provClean = provName.replace(/[省市区县州]$/,'');
    if (cityGuide[provClean]) return cityGuide[provClean];
    const provCap = provinceCapital[provName] || provinceCapital[provClean];
    if (provCap && cityGuide[provCap]) return cityGuide[provCap];
  }
  // 5. Cache (7-day)
  const cached = getGuideFromCache(cityName);
  if (cached) return cached;
  return null;
}

// ========== Smart Template Fallback ==========
function buildTemplateGuide(cityName, provName) {
  const loc = provName ? cityName+'（'+provName+'）' : cityName;
  return {
    attractions: [
      {n:loc+'城市公园',d:'在'+loc+'漫步城市绿肺，感受当地悠闲生活节奏'},
      {n:loc+'博物馆',d:'了解'+loc+'的历史文化和风土人情，值得花半天细细品味'},
      {n:loc+'商业街',d:'逛'+loc+'最热闹的街区，淘当地特产和手工艺品'},
      {n:loc+'自然风景',d:loc+'周边的自然风光，周末出游好去处'},
      {n:loc+'古迹遗址',d:loc+'的历史遗迹，见证这座城市的文化底蕴'},
    ],
    food: [
      {n:'当地特色菜',d:loc+'的本地菜肴融合了地域传统，口味独特值得一尝'},
      {n:'街头小吃',d:'在'+loc+'的夜市或小吃街，可以找到最地道的街头美味'},
      {n:'特产手信',d:'来'+loc+'一定要带些当地特产回去，送礼自用两相宜'},
      {n:'传统早点',d:loc+'人的早餐文化丰富，从一碗热腾腾的面开始新的一天'},
      {n:'时令美食',d:'根据季节不同，'+loc+'有各种应季的时令美味'},
    ],
  };
}

// ========== Load Panels (no Wikipedia, no external API) ==========
function loadPanelsSync(cityName, provName) {
  const attContent = document.getElementById('panelAttContent');
  const foodContent = document.getElementById('panelFoodContent');
  const guide = getCityGuide(cityName, provName);
  const finalGuide = guide || buildTemplateGuide(cityName, provName);
  renderPanel(attContent, finalGuide.attractions, '景点');
  renderPanel(foodContent, finalGuide.food, '美食');
}

// ========== Cache Helpers ==========
function getGuideFromCache(cityName){
  try{const r=localStorage.getItem('wg_'+cityName);if(!r)return null;const d=JSON.parse(r);if(Date.now()-d.t<7*24*3600*1000)return d.v;localStorage.removeItem('wg_'+cityName);}catch(e){}
  return null;
}
function setGuideToCache(cityName,v){try{localStorage.setItem('wg_'+cityName,JSON.stringify({v,t:Date.now()}));}catch(e){}}

// ========== Render Panel ==========
function renderPanel(container, items, tag) {
  if (!items || items.length===0) {
    container.innerHTML='<div class="panel-item"><div class="item-name">暂无数据</div><div class="item-desc">换个城市试试吧</div></div>';
    return;
  }
  container.innerHTML = items.map((item,i)=>{
    const name = item.n || item.name || '';
    const desc = item.d || item.desc || item.description || '';
    return '<div class="panel-item">'+
      (name?'<div class="item-name">'+(i+1)+'. '+name+'</div>':'')+
      '<div class="item-desc">'+desc+'</div>'+
      (tag?'<span class="item-rank">'+tag+'</span>':'')+
    '</div>';
  }).join('');
}

function updateSidePanels(cityName) {
  loadPanelsSync(cityName, currentProv);
}

// ========== Mobile Overlay Panel Logic ==========
function openMobilePanel(side) {
  const panelId = side === 'left' ? 'panelAttractions' : 'panelFood';
  const panel = document.getElementById(panelId);
  const backdrop = document.getElementById('mobileBackdrop');
  // Remove from any old overlay state
  panel.classList.add('mobile-overlay');
  if(side==='right')panel.classList.add('right');else panel.classList.remove('right');
  panel.classList.add('active');
  backdrop.classList.add('active');
  // Add close button if not present
  if(!panel.querySelector('.mobile-close')) {
    const btn = document.createElement('button');
    btn.className='mobile-close'; btn.textContent='✕'; btn.onclick=closeMobilePanels;
    panel.appendChild(btn);
  }
  document.body.style.overflow='hidden';
}

function closeMobilePanels() {
  document.getElementById('mobileBackdrop').classList.remove('active');
  document.querySelectorAll('.side-panel.mobile-overlay').forEach(p=>p.classList.remove('active'));
  document.body.style.overflow='';
}

// ========== Render ==========
function render(data, entry) {
  const cw = data.current_weather, daily = data.daily, hourly = data.hourly;
  const wmo = cw.weathercode; const [icon, desc] = getWeather(wmo);
  const cat = classifyWMO(wmo); applyTheme(cat);
  if (cat === WCAT.THUNDER) scheduleThunder(); else stopThunder();

  const nowIdx = Math.max(0, (hourly.time || []).findIndex(t => new Date(t) > new Date()) - 1);
  const feelLike = hourly.apparent_temperature?.[nowIdx] ?? cw.temperature;
  const humidity = hourly.relative_humidity_2m?.[nowIdx] ?? '--';
  const visibility = hourly.visibility?.[nowIdx];
  const pressure = hourly.pressure_msl?.[nowIdx];
  const visKm = visibility ? (visibility / 1000).toFixed(1) : '--';
  const uvMax = daily.uv_index_max?.[0] ?? '--';
  const windGust = daily.wind_gusts_10m_max?.[0] ?? '--';
  const windSpd = daily.wind_speed_10m_max?.[0] ?? cw.windspeed;
  const sunrise = formatTime(daily.sunrise?.[0]);
  const sunset = formatTime(daily.sunset?.[0]);
  const precipProb = daily.precipitation_probability_max[0] ?? 0;

  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

  const forecastHTML = daily.time.slice(0, 5).map((ds, i) => {
    const d = new Date(ds + 'T12:00:00');
    const dow = i === 0 ? '今天' : dayNames[d.getDay()];
    const [fIcon] = getWeather(daily.weathercode[i]);
    const hi = Math.round(daily.temperature_2m_max[i]), lo = Math.round(daily.temperature_2m_min[i]);
    return '<div class="forecast-day"><div class="dow">' + dow + '</div><div class="d-icon">' + fIcon + '</div><div class="d-temps"><span class="d-hi">' + hi + '°</span><span class="d-lo">' + lo + '°</span></div></div>';
  }).join('');

  // Build display name
  const isMuni = ['北京', '上海', '天津', '重庆'].includes(entry.p);
  let displayName, displaySub;
  if (isMuni) {
    displayName = entry.n;
    displaySub = entry.p;
  } else {
    displayName = entry.n;
    displaySub = (entry.c && entry.c !== entry.n ? entry.c + ' · ' : '') + entry.p;
  }

  document.getElementById('weatherContent').innerHTML =
    '<div class="city-hero" id="cityHero">' +
      '<div class="hero-skeleton" id="heroSkeleton"></div>' +
      '<div class="hero-label">' + displayName + '</div>' +
    '</div>' +
    '<div class="weather-main">' +
      '<div class="weather-icon">' + icon + '</div>' +
      '<div class="temp-block"><div class="temp-current">' + Math.round(cw.temperature) + '<span class="temp-unit">°C</span></div><div class="weather-desc">' + desc + '</div></div>' +
    '</div>' +
    '<div class="city-row">' +
      '<div><span class="city-name">📍 ' + displayName + '</span><span class="city-sub"> ' + displaySub + '</span></div>' +
      '<span class="refresh-dot" title="实时更新中"></span>' +
      '<span class="update-time">更新于 ' + timeStr + '</span>' +
    '</div>' +
    '<div class="sun-row">' +
      '<div class="sun-card"><span class="sun-icon">🌅</span><div><div class="sun-label">日出</div><div class="sun-time">' + sunrise + '</div></div></div>' +
      '<div class="sun-card"><span class="sun-icon">🌇</span><div><div class="sun-label">日落</div><div class="sun-time">' + sunset + '</div></div></div>' +
      '<div class="sun-card"><span class="sun-icon">☀️</span><div><div class="sun-label">紫外线指数</div><div class="sun-time">' + uvMax + '</div></div></div>' +
    '</div>' +
    '<div class="details-grid">' +
      '<div class="detail-item"><div class="label">体感温度</div><div class="value">' + Math.round(feelLike) + '<span class="unit">°C</span></div></div>' +
      '<div class="detail-item"><div class="label">湿度</div><div class="value">' + humidity + '<span class="unit">%</span></div></div>' +
      '<div class="detail-item"><div class="label">风速</div><div class="value">' + Math.round(windSpd) + '<span class="unit">km/h</span></div></div>' +
      '<div class="detail-item"><div class="label">阵风</div><div class="value">' + (typeof windGust === 'number' ? Math.round(windGust) : windGust) + '<span class="unit">km/h</span></div></div>' +
      '<div class="detail-item"><div class="label">风向</div><div class="value">' + windDirection(cw.winddirection) + '</div></div>' +
      '<div class="detail-item"><div class="label">能见度</div><div class="value">' + visKm + '<span class="unit">km</span></div></div>' +
      '<div class="detail-item"><div class="label">气压</div><div class="value">' + (typeof pressure === 'number' ? Math.round(pressure) : '--') + '<span class="unit">hPa</span></div></div>' +
      '<div class="detail-item"><div class="label">降水概率</div><div class="value">' + precipProb + '<span class="unit">%</span></div></div>' +
    '</div>' +
    '<div class="forecast-title">📅 未来五天</div>' +
    '<div class="forecast-strip">' + forecastHTML + '</div>';

  // Generate city gradients for hero + carousel (instant, no network needed)
  const imgSearchName = isMuni ? entry.p : (entry.c || entry.n);
  updateSidePanels(imgSearchName);
  const allGradients = cityGradients(imgSearchName);
  buildCarousel(allGradients);

  // Set hero background to first gradient (instant)
  const heroEl = document.getElementById('cityHero');
  if (heroEl) heroEl.style.background = allGradients[0].url;
  const heroSkelEl = document.getElementById('heroSkeleton');
  if (heroSkelEl) heroSkelEl.style.display = 'none';
}

function showLoading() {
  stopCarousel();
  document.getElementById('weatherContent').innerHTML = '<div class="loader"><div class="spinner"></div><span class="loader-text">正在获取 ' + currentCity + ' 的天气…</span></div>';
}
function showError(msg) {
  document.getElementById('weatherContent').innerHTML = '<div class="error-msg" style="padding:40px 24px;">⚠️ ' + msg + '<br><span style="font-size:13px;opacity:0.55;margin:12px 0;display:block;">网络连接可能有问题</span><button onclick="retryWeather()" style="margin-top:14px;padding:10px 28px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;">🔄 点击重试</button></div>';
}

// ========== Core ==========
let retryLat=39.9042, retryLon=116.4074, retryEntry=null;

function getWeatherCache(lat,lon){
  try{
    const r=localStorage.getItem('wx_'+lat.toFixed(2)+'_'+lon.toFixed(2));
    if(!r)return null;
    const d=JSON.parse(r);
    if(Date.now()-d.t<3600000)return d.v;
    localStorage.removeItem('wx_'+lat.toFixed(2)+'_'+lon.toFixed(2));
  }catch(e){}
  return null;
}
function setWeatherCache(lat,lon,data){
  try{localStorage.setItem('wx_'+lat.toFixed(2)+'_'+lon.toFixed(2),JSON.stringify({v:data,t:Date.now()}));}catch(e){}
}

async function loadWeather(lat, lon, entry) {
  retryLat=lat;retryLon=lon;retryEntry=entry||{n:currentCity,p:currentProv,c:currentCity,displayPath:currentCity+' · '+currentProv};
  // Try cache first
  const cached = getWeatherCache(lat, lon);
  if (cached) {
    currentLat=lat;currentLon=lon;
    currentCity=retryEntry.n;currentProv=retryEntry.p;
    render(cached, retryEntry);
  } else {
    showLoading();
  }
  // Fetch fresh data
  try {
    const data = await fetchWithTimeout(lat, lon);
    currentLat=lat;currentLon=lon;
    currentCity=retryEntry.n;currentProv=retryEntry.p;
    setWeatherCache(lat,lon,data);
    render(data, retryEntry);
  } catch(e) {
    console.error('Weather fetch failed:',e);
    if(!cached)showError('无法获取天气数据');
  }
}

function retryWeather(){loadWeather(retryLat,retryLon,retryEntry);}

async function fetchWithTimeout(lat, lon){
  return new Promise((resolve, reject) => {
    const timer = setTimeout(()=>reject(new Error('请求超时')),15000);
    fetchWeather(lat, lon).then(d=>{clearTimeout(timer);resolve(d);}).catch(e=>{clearTimeout(timer);reject(e);});
  });
}

async function onSearch(query) {
  const dd = document.getElementById('searchDropdown');
  if (!query.trim()) { dd.classList.remove('active'); return; }
  try {
    const results = await geocode(query.trim());
    if (results.length === 0) {
      dd.innerHTML = '<div class="item" style="color:rgba(255,255,255,0.35);">未找到匹配位置</div>';
      dd.classList.add('active'); return;
    }
    dd.innerHTML = results.map(r =>
      '<div class="item" data-lat="' + r.lat + '" data-lon="' + r.lon + '" data-name="' + r.n + '" data-prov="' + r.p + '" data-city="' + (r.c || '') + '">' +
        '<span class="loc-name">' + r.n + '</span>' +
        '<span class="loc-path">' + r.displayPath + '</span>' +
      '</div>'
    ).join('');
    dd.classList.add('active');
  } catch (e) { console.error(e); dd.classList.remove('active'); }
}

// Use event delegation for dropdown clicks (more reliable on mobile)
document.getElementById('searchDropdown').addEventListener('click', function(e) {
  const item = e.target.closest('.item[data-lat]');
  if (!item) return;
  document.getElementById('searchInput').value = item.dataset.name;
  document.getElementById('searchDropdown').classList.remove('active');
  loadWeather(parseFloat(item.dataset.lat), parseFloat(item.dataset.lon), {
    n: item.dataset.name, p: item.dataset.prov, c: item.dataset.city,
    displayPath: item.querySelector('.loc-path').textContent
  });
});

// ========== Events ==========
const si = document.getElementById('searchInput'), sd = document.getElementById('searchDropdown');
si.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => onSearch(si.value), 180); });
si.addEventListener('focus', () => { if (sd.children.length > 0) sd.classList.add('active'); });
si.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const f = sd.querySelector('.item[data-lat]'); if (f) f.click(); sd.classList.remove('active'); }
  if (e.key === 'Escape') { sd.classList.remove('active'); si.blur(); }
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) sd.classList.remove('active'); });

function startAutoRefresh() { refreshTimer = setInterval(() => { loadWeather(currentLat, currentLon, retryEntry); }, 5 * 60 * 1000); }

// ========== Sparkle Generator ==========
function initSparkles(){
  const frag = document.createDocumentFragment();
  for(let i=0;i<25;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random()*95+'%';
    s.style.top = (Math.random()*60+20)+'%';
    s.style.setProperty('--sdur',(Math.random()*6+4)+'s');
    s.style.setProperty('--sdelay',(Math.random()*8)+'s');
    s.style.width = (Math.random()*2+1)+'px';
    s.style.height = s.style.width;
    frag.appendChild(s);
  }
  document.body.appendChild(frag);
}

async function init() {
  retryEntry = { n: '北京', p: '北京', c: '北京', displayPath: '北京' };
  await loadWeather(39.9042, 116.4074, retryEntry);
  startAutoRefresh();
  initSparkles();
}
init();
</script>
